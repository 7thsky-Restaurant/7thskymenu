      h("button",{onClick:create,style:{width:"100%",background:"#c8a44e",color:"#08090d",border:"none",padding:10,borderRadius:6,fontWeight:700,fontSize:12,cursor:"pointer"}},"Create Coupon")
    ):null,
    view==="list"?coupons.map(function(c){return h("div",{key:c.id,style:{background:"#111318",borderRadius:6,padding:"8px 10px",marginBottom:4,border:"1px solid "+(c.is_active?"#c8a44e20":"#ef444420"),opacity:c.is_active?1:0.5}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},h("div",null,h("span",{style:{fontFamily:"monospace",fontSize:13,fontWeight:800,color:c.is_active?"#c8a44e":"#6b7280"}},c.code),h("span",{style:{fontSize:9,color:"#6b7280",marginLeft:4}},c.type==="percent"?c.value+"%":"Rs."+c.value),h("div",{style:{fontSize:8,color:"#5e5447"}},c.description||"")),h("div",{style:{display:"flex",gap:2}},h("button",{onClick:function(){toggle(c.id,c.is_active)},style:{background:c.is_active?"#ef444418":"#22c55e18",color:c.is_active?"#ef4444":"#22c55e",border:"none",padding:"2px 5px",borderRadius:3,fontSize:7,fontWeight:700,cursor:"pointer"}},c.is_active?"Off":"On"),h("button",{onClick:function(){del(c.id)},style:{background:"#ef444412",color:"#ef4444",border:"none",padding:"2px 5px",borderRadius:3,fontSize:7,cursor:"pointer"}},"Del")))
    )}):null
  );
}
// === APP ===
function App(){
  var od=useState([]),orders=od[0],setOrders=od[1];
  var av=useState({}),avail=av[0],setAvail=av[1];
  var mn=useState(null),menu=mn[0],setMenu=mn[1];
  var cp=useState([]),dbCoupons=cp[0],setDbCoupons=cp[1];
  var db=useState(false),dbReady=db[0],setDbReady=db[1];
  var sf=useState(null),staff=sf[0],setStaff=sf[1];
  var wl=useState(PANEL!=="guest"),welcomed=wl[0],setWelcomed=wl[1];
  var rm=useState(""),room=rm[0],setRoom=rm[1];
  var gn=useState(""),gName=gn[0],setGName=gn[1];
  var gp=useState(""),gPhone=gp[0],setGPhone=gp[1];
  var needsLogin=PANEL==="admin"||PANEL==="cash"||PANEL==="reception";

  useEffect(function(){
    (async function(){
      try{
        var today=new Date();today.setHours(0,0,0,0);
        var res=await sb.from("orders").select("*").gte("created_at",today.toISOString()).order("created_at",{ascending:true});
        var formatted=[];
        for(var i=0;i<(res.data||[]).length;i++){
          var o=res.data[i];
          var ir=await sb.from("order_items").select("*").eq("order_id",o.id);
          formatted.push({id:o.id,room:o.room_number,guestName:o.guest_name,guestPhone:o.guest_phone,instructions:o.instructions||"",subtotal:Number(o.subtotal),couponDiscount:Number(o.coupon_discount||0),couponCode:o.coupon_code,payNowDiscount:Number(o.pay_now_discount||0),total:Number(o.total),paymentMethod:o.payment_method,payMode:o.pay_mode,orderType:o.order_type,status:o.order_status,collectionSource:o.collection_source||null,collectedBy:o.collected_by||null,settlementStatus:o.settlement_status||null,settlementDate:o.settlement_date||null,time:new Date(o.created_at),items:(ir.data||[]).map(function(x){return{name:x.item_name,qty:x.quantity,price:Number(x.unit_price)}})});
        }
        setOrders(formatted);
        var cpR=await sb.from("custom_coupons").select("*").eq("is_active",true);
        if(cpR.data)setDbCoupons(cpR.data.filter(function(c){return c.used_count<c.max_uses}));
        setDbReady(true);
      }catch(e){console.error("Init:",e);setDbReady(true)}
    })();
    var ch=sb.channel("v2-all")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"orders"},async function(payload){
        var o=payload.new;
        var ir=await sb.from("order_items").select("*").eq("order_id",o.id);
        var newO={id:o.id,room:o.room_number,guestName:o.guest_name,guestPhone:o.guest_phone,instructions:o.instructions||"",subtotal:Number(o.subtotal),couponDiscount:Number(o.coupon_discount||0),couponCode:o.coupon_code,payNowDiscount:Number(o.pay_now_discount||0),total:Number(o.total),paymentMethod:o.payment_method,payMode:o.pay_mode,orderType:o.order_type,status:o.order_status,collectionSource:o.collection_source||null,collectedBy:o.collected_by||null,time:new Date(o.created_at),items:(ir.data||[]).map(function(x){return{name:x.item_name,qty:x.quantity,price:Number(x.unit_price)}})};
        setOrders(function(p){if(p.find(function(x){return x.id===o.id}))return p;playBeep();return p.concat([newO])});
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"orders"},function(payload){
        var o=payload.new;
        setOrders(function(p){return p.map(function(x){return x.id===o.id?Object.assign({},x,{status:o.order_status,paymentMethod:o.payment_method,collectionSource:o.collection_source,collectedBy:o.collected_by,settlementStatus:o.settlement_status,settlementDate:o.settlement_date}):x})});
      })
      .subscribe();
    return function(){sb.removeChannel(ch)};
  },[]);

  var placeOrder=useCallback(async function(o){
    setOrders(function(p){return p.concat([o])});playBeep();
    try{
      var sessionId=null;
      // For dine-in: create or find open table session
      if(o.orderType==="DINE_IN"&&isTable(o.room)){
        try{
          var tableNum=String(o.room).slice(1);
          var sr=await sb.from("table_sessions").select("*").eq("table_number",tableNum).eq("status","OPEN").order("created_at",{ascending:false}).limit(1);
          if(sr.error){console.error("Session query error:",sr.error)}
          if(sr.data&&sr.data.length>0){
            sessionId=sr.data[0].id;
            var upd=await sb.from("table_sessions").update({total_amount:Number(sr.data[0].total_amount)+o.total,guest_name:o.guestName,guest_phone:o.guestPhone}).eq("id",sessionId);
            if(upd.error)console.error("Session update error:",upd.error);
          }else{
            sessionId=uid();
            var ins=await sb.from("table_sessions").insert({id:sessionId,table_number:tableNum,guest_name:o.guestName,guest_phone:o.guestPhone,status:"OPEN",total_amount:o.total});
            if(ins.error){console.error("Session insert error:",ins.error);alert("Table session error: "+ins.error.message);sessionId=null}
          }
        }catch(se){console.error("Session error:",se);alert("Session catch: "+se.message);sessionId=null}
      }
      // Try full insert with new columns
      var insertData={id:o.id,room_number:o.room,guest_name:o.guestName,guest_phone:o.guestPhone,instructions:o.instructions||null,subtotal:o.subtotal,coupon_code:o.couponCode,coupon_discount:o.couponDiscount,pay_now_discount:o.payNowDiscount,total:o.total,payment_method:o.paymentMethod,order_status:"NEW",collection_source:(o.payMode==="online"&&!isTable(o.room))?"RESTAURANT":null,collected_by:(o.payMode==="online"&&!isTable(o.room))?"Online":null};
      // Add new columns only if they might exist
      insertData.pay_mode=o.payMode||null;
      insertData.order_type=o.orderType||"ROOM";
      if(sessionId)insertData.session_id=sessionId;
      var res=await sb.from("orders").insert(insertData);
      if(res.error){
        console.error("Order insert error:",res.error);
        // Fallback: try without new columns
        var basic={id:o.id,room_number:o.room,guest_name:o.guestName,guest_phone:o.guestPhone,instructions:o.instructions||null,subtotal:o.subtotal,coupon_code:o.couponCode,coupon_discount:o.couponDiscount,pay_now_discount:o.payNowDiscount,total:o.total,payment_method:o.paymentMethod,order_status:"NEW",collection_source:(o.payMode==="online"&&!isTable(o.room))?"RESTAURANT":null,collected_by:(o.payMode==="online"&&!isTable(o.room))?"Online":null};
        var res2=await sb.from("orders").insert(basic);
        if(res2.error){console.error("Fallback also failed:",res2.error);alert("Order save failed: "+res2.error.message);return}
      }
      var ir=await sb.from("order_items").insert(o.items.map(function(i){return{order_id:o.id,item_name:i.name,quantity:i.qty,unit_price:i.price,line_total:i.price*i.qty}}));
      if(ir.error)console.error("Items error:",ir.error);
    }catch(e){console.error("Save:",e);alert("Order error: "+e.message)}
  },[]);

  var updateStatus=useCallback(async function(id,st){setOrders(function(p){return p.map(function(o){return o.id===id?Object.assign({},o,{status:st}):o})});await sb.from("orders").update({order_status:st}).eq("id",id)},[]);

  var collectPayment=useCallback(async function(id,src,who){setOrders(function(p){return p.map(function(o){return o.id===id?Object.assign({},o,{paymentMethod:"PAID",collectionSource:src,collectedBy:who}):o})});await sb.from("orders").update({payment_method:"PAID",collection_source:src,collected_by:who}).eq("id",id)},[]);

  if(!dbReady)return h("div",{style:{minHeight:"100vh",background:"#08090d",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}},h("div",{style:{fontSize:30,color:"#c8a44e",marginBottom:10}},"*"),h("div",{style:{color:"#5e5447",fontSize:12}},"Connecting..."));
  if(needsLogin&&!staff)return h(Login,{panelType:PANEL,onLogin:setStaff});
  if(PANEL==="guest"&&!welcomed)return h(Welcome,{onGo:function(n,p,sType,sNum){setGName(n);setGPhone(p);setRoom(sType==="table"?"T"+sNum:sNum);setWelcomed(true)}});

  return h("div",null,
    PANEL==="guest"?h(GuestMenu,{onOrder:placeOrder,room:room,gName:gName,gPhone:gPhone,avail:avail,menu:menu||MENU,coupons:dbCoupons}):null,
    PANEL==="kitchen"?h(Kitchen,{orders:orders,onUpdate:updateStatus}):null,
    PANEL==="cash"?h(CashPanel,{orders:orders,onUpdate:updateStatus,onCollect:collectPayment,staff:staff}):null,
    PANEL==="reception"?h(Reception,{orders:orders,onCollect:collectPayment,staff:staff}):null,
    PANEL==="admin"?h(Admin,{orders:orders,avail:avail,setAvail:setAvail,staff:staff,collectPayment:collectPayment,setOrders:setOrders,menu:menu||MENU}):null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
