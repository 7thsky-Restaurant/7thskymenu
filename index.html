// Soft notification sound
const playSound=()=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();[880,1100,1320].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(0.25,c.currentTime+i*0.18);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.18+0.2);o.start(c.currentTime+i*0.18);o.stop(c.currentTime+i*0.18+0.2)})}catch(e){}};

// LOUD persistent alarm for kitchen - loops until stopped
var alarmInterval=null;
function startAlarm(){
  if(alarmInterval)return;
  function buzz(){
    try{var c=new(window.AudioContext||window.webkitAudioContext)();
    [800,1000,800,1200,800,1000].forEach(function(f,i){
      var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
      o.frequency.value=f;o.type="square";
      g.gain.setValueAtTime(0.4,c.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.12+0.11);
      o.start(c.currentTime+i*0.12);o.stop(c.currentTime+i*0.12+0.12);
    })}catch(e){}
  }
  buzz();
  alarmInterval=setInterval(buzz,2000);
}
function stopAlarm(){if(alarmInterval){clearInterval(alarmInterval);alarmInterval=null}}

// Time-based availability check
function isTimeAvailable(note){
  if(!note)return false; // no note means manually off
  var now=new Date();var h=now.getHours();
  // Parse patterns like "7-11 AM only", "After 6 PM", "After 8 PM"
  if(note.match(/after\s*(\d+)\s*pm/i)){var pm=parseInt(note.match(/after\s*(\d+)\s*pm/i)[1]);return h>=(pm===12?12:pm+12)}
  if(note.match(/after\s*(\d+)\s*am/i)){var am=parseInt(note.match(/after\s*(\d+)\s*am/i)[1]);return h>=am}
  if(note.match(/(\d+)[-–](\d+)\s*am/i)){var m=note.match(/(\d+)[-–](\d+)\s*am/i);return h>=parseInt(m[1])&&h<parseInt(m[2])}
  if(note.match(/(\d+)\s*am[-–](\d+)\s*pm/i)){var m2=note.match(/(\d+)\s*am[-–](\d+)\s*pm/i);return h>=parseInt(m2[1])&&h<(parseInt(m2[2])+12)}
  if(note.match(/(\d+)[-–](\d+)\s*pm/i)){var m3=note.match(/(\d+)[-–](\d+)\s*pm/i);return h>=(parseInt(m3[1])+12)&&h<(parseInt(m3[2])+12)}
  return false; // can't parse = unavailable
}

// Excel export utility
function exportToExcel(data,filename){
  var ws=XLSX.utils.json_to_sheet(data);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Report");
  // Auto-width columns
  var colWidths=Object.keys(data[0]||{}).map(function(k){
    var max=k.length;
    data.forEach(function(r){var v=String(r[k]||"");if(v.length>max)max=v.length});
    return{wch:Math.min(max+2,40)};
  });
  ws["!cols"]=colWidths;
  XLSX.writeFile(wb,filename);
}

    var r=await sb.from("daily_settlements").select("*").order("settlement_date",{ascending:false}).limit(30);
    if(r.data)setHistory(r.data);
  }

  // Calculate today's numbers from orders
  var today=new Date().toISOString().slice(0,10);
  var todayOrders=orders;

  // Direct to us (online pay + dine-in cash)
  var directPaid=todayOrders.filter(function(o){return o.paymentMethod==="PAID"&&o.collectionSource!=="RECEPTION"}).reduce(function(s,o){return s+o.total},0);
  // Collected by reception (they have our money)
  var receptionCollected=todayOrders.filter(function(o){return o.collectionSource==="RECEPTION"}).reduce(function(s,o){return s+o.total},0);
  // Still pending at reception (guest chose pay later, reception hasn't collected yet)
  var receptionPending=todayOrders.filter(function(o){return o.paymentMethod==="PAY_LATER"&&!o.collectionSource}).reduce(function(s,o){return s+o.total},0);
  // Total business
  var totalBusiness=todayOrders.reduce(function(s,o){return s+o.total},0);
  // What reception owes us = collected by reception (not yet settled)
  var receptionOwes=receptionCollected;

  // Reception orders detail
  var receptionOrders=todayOrders.filter(function(o){return o.collectionSource==="RECEPTION"});
  var pendingOrders=todayOrders.filter(function(o){return o.paymentMethod==="PAY_LATER"&&!o.collectionSource});

  async function settleNow(){
    if(receptionOwes<=0){setMsg("Nothing to settle!");return}
    setLoading(true);
    try{
      await sb.from("daily_settlements").insert({
        settlement_date:today,
        restaurant_collected:directPaid,
        reception_collected:receptionCollected,
        total_pending:receptionPending,
        settled_by:staff?staff.display_name:"Admin",
        notes:notes||"Daily settlement"
      });
      // Mark all reception-collected orders as settled
      for(var i=0;i<receptionOrders.length;i++){
        await sb.from("orders").update({settlement_status:"SETTLED_WITH_HOTEL",settlement_date:today}).eq("id",receptionOrders[i].id);
      }
      setMsg("✅ Settlement of ₹"+receptionOwes+" recorded! Reception amount cleared.");
      setNotes("");loadHistory();

    setLoading(false);

        React.createElement("div",{style:{fontSize:22,fontWeight:800,color:"#c8a44e"}},"₹"+totalBusiness)

        React.createElement("div",{style:{fontSize:22,fontWeight:800,color:"#22c55e"}},"₹"+directPaid),
        React.createElement("div",{style:{fontSize:9,color:"#6b7280"}},"Online + Dine-in cash")
      ),
      React.createElement("div",{style:{background:"#111318",borderRadius:10,padding:12,borderLeft:"3px solid #8b5cf6"}},
        React.createElement("div",{style:{color:"#6b7280",fontSize:8,textTransform:"uppercase",letterSpacing:1}},"Reception Collected"),
        React.createElement("div",{style:{fontSize:22,fontWeight:800,color:"#8b5cf6"}},"₹"+receptionCollected),
        React.createElement("div",{style:{fontSize:9,color:"#6b7280"}},"They owe us this")

        React.createElement("div",{style:{color:"#6b7280",fontSize:8,textTransform:"uppercase",letterSpacing:1}},"Guest Not Paid Yet"),
        React.createElement("div",{style:{fontSize:22,fontWeight:800,color:"#f59e0b"}},"₹"+receptionPending),
        React.createElement("div",{style:{fontSize:9,color:"#6b7280"}},"Still at reception")
      )
    ),

    // Reception owes section
    receptionOwes>0?React.createElement("div",{style:{background:"#8b5cf615",border:"2px solid #8b5cf640",borderRadius:12,padding:16,marginBottom:16}},

      React.createElement("div",{style:{fontSize:11,color:"#8b5cf680",marginBottom:12}},"This is money collected by reception from room guests for your food orders"),
