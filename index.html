    h("div",{style:{textAlign:"center",maxWidth:380}},
      h("h1",{style:{fontSize:34,fontWeight:400,color:"#c8a44e",letterSpacing:3,fontFamily:"Georgia,serif",marginBottom:4}},"7th Sky"),
      h("div",{style:{fontSize:13,color:"#9b8e7e",letterSpacing:8,textTransform:"uppercase",marginBottom:24}},"Fine Dine"),
      h("div",{style:{background:"rgba(239,68,68,0.08)",border:"2px solid rgba(239,68,68,0.2)",borderRadius:20,padding:"30px 24px",marginBottom:20}},
        h("div",{style:{fontSize:40,marginBottom:10}},"!"),
        h("div",{style:{fontSize:20,fontWeight:700,color:"#ef4444",marginBottom:6}},"Temporarily Closed"),
        h("div",{style:{fontSize:14,color:"#9b8e7e",lineHeight:1.6,marginBottom:16}},"We are not taking online orders right now. Please call us to place your order directly."),
        h("a",{href:"tel:7878343305",style:{display:"inline-block",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",textDecoration:"none",padding:"14px 28px",borderRadius:12,fontSize:18,fontWeight:800,letterSpacing:1}},"Call 78783 43305"),
        h("div",{style:{fontSize:11,color:"#5e5447",marginTop:12}},"We will be back soon!")
      ),
      h("div",{style:{fontSize:11,color:"#5e5447",letterSpacing:2}},"Pure Vegetarian | Sirohi, Rajasthan")
    )
  );
  if(PANEL==="guest"&&!welcomed)return h(Welcome,{onGo:function(n,p,sType,sNum){setGName(n);setGPhone(p);setRoom(sType==="table"?"T"+sNum:sNum);setWelcomed(true)}});

  return h("div",null,
    PANEL==="guest"?h(GuestMenu,{onOrder:placeOrder,room:room,gName:gName,gPhone:gPhone,avail:avail,menu:menu||MENU,coupons:dbCoupons}):null,
    PANEL==="kitchen"?h(Kitchen,{orders:orders,onUpdate:updateStatus}):null,
    PANEL==="cash"?h(CashPanel,{orders:orders,onUpdate:updateStatus,onCollect:collectPayment,staff:staff}):null,
    PANEL==="reception"?h(Reception,{orders:orders,onCollect:collectPayment,staff:staff}):null,
    PANEL==="admin"?h(Admin,{orders:orders,avail:avail,setAvail:setAvail,staff:staff,collectPayment:collectPayment,setOrders:setOrders,menu:menu||MENU,storeOpen:storeOpen,setStoreOpen:setStoreOpen}):null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
